<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batcave - System Active</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #1e1f22; color: #dbdee1; font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* --- 1. 스플래시 연출 --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1e1f22; display: flex; justify-content: center; align-items: center;
            z-index: 10000; animation: fadeOut 0.5s ease-in-out 2.0s forwards;
        }
        
        .logo-container { position: relative; width: 250px; height: 250px; }
        
        .wayne-logo {
            position: absolute; width: 90%; height: 90%;
            /* 업로드하신 파일명으로 정확히 매핑 */
            background: url('image/Wayne Ent. logo(white).png') no-repeat center/contain;
            animation: shatterRight 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s forwards;
        }
        
        .bat-symbol {
            position: absolute; width: 100%; height: 100%; opacity: 0;
            /* 업로드하신 파일명으로 정확히 매핑 */
            background: url('image/bat_symbol.png') no-repeat center/contain;
            animation: fadeInSymbol 0.8s ease-in-out 0.3s forwards;
        }

       /* --- 2. 대시보드 (모바일 대응 강화) --- */
        #dashboard { 
            max-width: 935px; margin: 0 auto; padding: 20px; 
            opacity: 0; animation: fadeInBody 0.5s ease-in-out 2.0s forwards; 
        }
        
        .profile-header { display: flex; align-items: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #2b2d31; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 1px solid #2b2d31; background: #313338; }
        .profile-info { margin-left: 20px; }
        .stats-table { display: flex; gap: 20px; margin: 10px 0; font-size: 0.9rem; }
        
        /* 3열 그리드 모바일 비율 최적화 */
        .showcase-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-card { width: 100%; aspect-ratio: 1 / 1; background-color: #2b2d31; }
        .grid-card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 애니메이션 제어 --- */
        @keyframes shatterRight { 100% { opacity: 0; transform: translateX(30px); filter: blur(4px); } }
        @keyframes fadeInSymbol { 
            0% { opacity: 0; transform: scale(0.9); } 
            30%, 85% { opacity: 1; transform: scale(1); } 
            100% { opacity: 0; } 
        }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes fadeInBody { to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="splash-screen">
        <div class="logo-container">
            <div class="wayne-logo"></div>
            <div class="bat-symbol"></div>
        </div>
    </div>

    <div id="dashboard">
        <header class="profile-header">
            <div class="avatar"></div>
            <div class="profile-info">
                <h2>Mr. Wayne</h2>
                <div class="stats-table">
                    <div class="stat-item"><b>12</b> 항목</div>
                    <div class="stat-item"><b>Alpha</b> 보안</div>
                </div>
            </div>
        </header>
        <main class="showcase-grid">
            <div class="grid-card"><img src="image/suit_arkham.jpg" alt="Suit"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
        </main>
    </div>
</body>
</html>
