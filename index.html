<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batcave - System Active</title>
    <style>
        /* --- 기본 시스템 테마 (디스코드 다크 테마 기반) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #1e1f22; 
            color: #dbdee1; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow-x: hidden; 
        }

        /* --- 1. 라이징 오버라이드 스플래시 연출 구역 --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #1e1f22; display: flex; justify-content: center; align-items: center;
            z-index: 10000; animation: fadeOut 0.2s ease-in-out 0.8s forwards;
        }
        .logo-container { position: relative; width: 160px; height: 160px; }
        
        /* 웨인 엔터프라이즈 로고: 0.2초 유지 후 우측 파편화 비산 */
        .wayne-logo {
            position: absolute; width: 100%; height: 100%;
            background: url('image/Wayne Ent. logo(white).png') no-repeat center/contain;
            animation: shatterRight 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.2s forwards;
        }
        /* 배트 심볼: 파편화와 동시에 은은한 발광과 함께 투영 */
        .bat-symbol {
            position: absolute; width: 100%; height: 100%; opacity: 0;
            background: url('image/bat_symbol.png') no-repeat center/contain;
            animation: fadeInSymbol 0.4s ease-in-out 0.2s forwards;
        }

        /* --- 2. 메인 전술 관제 대시보드 (스케치 아키텍처 반영) --- */
        #dashboard {
            max-width: 935px; /* 인스타그램 PC 뷰 가로폭 표준 규격 */
            margin: 0 auto; 
            padding: 40px 20px;
            opacity: 0; 
            animation: fadeInBody 0.4s ease-in-out 0.8s forwards;
        }

        /* 프로필 헤더 링크 */
        .profile-header { 
            display: flex; 
            align-items: center; 
            margin-bottom: 44px; 
            border-bottom: 1px solid #2b2d31;
            padding-bottom: 44px;
        }
        .avatar-container { flex-of-slice: 1; display: flex; justify-content: center; margin-right: 30px; }
        .avatar { 
            width: 150px; height: 150px; border-radius: 50%; 
            border: 1px solid #2b2d31; background: #313338;
            background: url('image/profile_avatar.png') no-repeat center/cover;
        }
        
        .profile-info { flex-grow: 2; }
        .info-top { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .info-top h2 { font-size: 1.7rem; color: #f2f3f5; font-weight: 300; }

        /* 인스타 수치창 -> 전술 사양 테이블 전환 */
        .stats-table { display: flex; gap: 40px; margin-bottom: 20px; }
        .stat-item { font-size: 1rem; color: #b5bac1; }
        .stat-item span { color: #f2f3f5; font-weight: 600; margin-right: 5px; }

        /* 바이오 구역 */
        .profile-bio { font-size: 0.95rem; line-height: 1.6; color: #dbdee1; }
        .profile-bio p { color: #b5bac1; }

        /* --- 3. 탭 셀렉터 및 절대 무너지지 않는 3열 그리드 --- */
        .tab-menu {
            display: flex; justify-content: center; gap: 60px;
            border-top: 1px solid #2b2d31; padding: 15px 0; font-size: 0.75rem;
            letter-spacing: 1px; font-weight: 600; color: #949ba4; margin-bottom: 20px;
        }
        .tab-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .tab-item.active { color: #f2f3f5; border-top: 1px solid #f2f3f5; margin-top: -16px; padding-top: 15px; }

        .showcase-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; /* 인스타 PC 피드 정렬폭 */
        }
        .grid-card {
            width: 100%; aspect-ratio: 3 / 4; background-color: #2b2d31;
            border: 1px solid rgba(255, 255, 255, 0.03); position: relative; overflow: hidden;
            transition: transform 0.2s ease;
        }
        .grid-card:hover { transform: scale(1.02); }
        .grid-card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- 애니메이션 연산 프로토콜 --- */
        @keyframes shatterRight {
            0% { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
            100% { opacity: 0; transform: translateX(40px) scale(0.95); filter: blur(6px); }
        }
        @keyframes fadeInSymbol {
            0% { opacity: 0; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeOut {
            0% { opacity: 1; visibility: visible; }
            100% { opacity: 0; visibility: hidden; }
        }
        @keyframes fadeInBody {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* 모바일 터미널 단말기 환경 최적화 미디어쿼리 */
        @media (max-width: 735px) {
            #dashboard { padding: 0; }
            .profile-header { padding: 20px; margin-bottom: 0; border-bottom: none; }
            .avatar { width: 77px; height: 77px; }
            .info-top h2 { font-size: 1.4rem; }
            .stats-table { justify-content: space-around; width: 100%; border-top: 1px solid #2b2d31; padding-top: 12px; gap: 0; }
            .tab-menu { gap: 0; justify-content: space-around; font-size: 0.7rem; }
            .showcase-grid { gap: 3px; } /* 모바일 환경 조밀 배치 전술 */
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-container">
            <div class="wayne-logo"></div>
            <div class="bat-symbol"></div>
        </div>
    </div>

    <div id="dashboard">
        <header class="profile-header">
            <div class="avatar-container">
                <div class="avatar"></div>
            </div>
            <div class="profile-info">
                <div class="info-top">
                    <h2>Mr. Wayne</h2>
                </div>
                <div class="stats-table">
                    <div class="text-item"><b>12</b> 항목</div>
                    <div class="text-item"><b>Alpha</b> 보안 등급</div>
                    <div class="text-item"><b>Online</b> 시스템 상태</div>
                </div>
                <section class="profile-bio">
                    <p>고담의 밤에 최적화된 기동성 및 방검/방탄 인프라. 배트케이브 중앙 데이터 연동 확인 완료.</p>
                </section>
            </div>
        </header>

        <nav class="tab-menu">
            <div class="tab-item active">SUITS</div>
            <div class="tab-item">UTILITY BELT</div>
            <div class="tab-item">VEHICLES</div>
        </nav>

        <main class="showcase-grid">
            <div class="grid-card"><img src="image/suit_arkham.jpg" alt="Suit 01"></div>
            <div class="grid-card"><img src="image/suit_classic.jpg" alt="Suit 02"></div>
            <div class="grid-card"><img src="image/gadget_batarang.jpg" alt="Gadget 01"></div>
            <div class="grid-card"><img src="image/vehicle_batmobile.jpg" alt="Vehicle 01"></div>
            <div class="grid-card"></div>
            <div class="grid-card"></div>
        </main>
    </div>

</body>
</html>
